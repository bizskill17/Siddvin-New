name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Deploy to Hostinger (FTP root = public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || '21' }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          security: ${{ vars.FTP_SECURITY || 'strict' }}
          local-dir: dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          timeout: ${{ vars.FTP_TIMEOUT || '120000' }}
          dangerous-clean-slate: ${{ vars.FTP_CLEAN_SLATE == 'true' }}
